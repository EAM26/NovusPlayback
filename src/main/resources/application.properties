# Environment variables
novus.host=${NOVUS_HOST}
novus.port=${NOVUS_PORT:554}
novus.username=${NOVUS_USERNAME}
novus.password=${NOVUS_PASSWORD}

# Logger
logging.file.name=logs/novus-playback.log
logging.level.root=INFO
logging.level.org.eamcode.novusplayback=INFO
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Rolling / retention
logging.logback.rollingpolicy.max-file-size=100MB
logging.logback.rollingpolicy.max-history=120
logging.logback.rollingpolicy.total-size-cap=2GB